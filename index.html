<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Plant Moment</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --w:393px;--h:852px;
  --bg:#fafafa;--card:#f5f5f5;--white:#fff;
  --text:#1a1a1a;--muted:#a3a3a3;--line:#ebebeb;
  --red:#e57373;--green:#81c784;
  --serif:"Songti SC","STSong",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
  --r:24px;--r-sm:16px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:#ddd;display:flex;align-items:center;justify-content:center;min-height:100dvh;-webkit-font-smoothing:antialiased}
.phone{width:var(--w);height:var(--h);max-height:100dvh;background:var(--bg);border-radius:48px;overflow:hidden;position:relative;box-shadow:0 0 0 10px #111,0 0 0 12px #333,0 30px 80px rgba(0,0,0,.15);display:flex;flex-direction:column}
@media(max-width:420px){body{background:var(--bg)}.phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}}

.status{padding:14px 28px 6px;display:flex;justify-content:space-between;font-size:15px;font-weight:600;color:var(--text);flex-shrink:0;z-index:10}
.status__r{display:flex;gap:5px;align-items:center;font-size:12px}

.view{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;visibility:hidden;transform:translateX(18px);transition:opacity .35s,transform .35s,visibility .35s;background:var(--bg)}
.page.active{opacity:1;visibility:visible;transform:none}
.page::-webkit-scrollbar{display:none}

/* ── Calendar ── */
.cal{padding:8px 24px 120px;text-align:center}
.cal__today{font-family:var(--serif);font-size:42px;font-weight:400;color:var(--text);letter-spacing:-.02em;line-height:1.1}
.cal__date{font-family:var(--serif);font-size:36px;color:var(--text);margin-bottom:28px}
.cal__card{background:var(--white);border-radius:28px;padding:20px 16px 16px;box-shadow:0 4px 24px rgba(0,0,0,.04);margin:0 auto;max-width:340px}
.cal__grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.cal__day{aspect-ratio:1;border-radius:10px;background:#f3f3f3;display:flex;align-items:center;justify-content:center;font-size:13px;color:#c8c8c8;position:relative;font-weight:400}
.cal__day.is-today{background:#efefef;color:#888}
.cal__day.has-sticker{cursor:pointer;background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.cal__day.has-sticker .cal__num{opacity:0}
.cal__sticker{position:absolute;width:150%;height:150%;z-index:2;transform:rotate(var(--rot,-5deg));pointer-events:auto;cursor:pointer}
.cal__sticker img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.1))}
.cal__hint{margin-top:28px;font-size:13px;color:var(--muted);letter-spacing:.02em}
.cal__fab-wrap{position:absolute;bottom:36px;left:0;right:0;display:flex;justify-content:center;z-index:20;pointer-events:none}
.cal__fab{pointer-events:auto;width:64px;height:64px;border-radius:50%;border:none;background:var(--white);cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.cal__fab::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 200deg,#e8b4f8,#ffb8a0,#ffe0a0,#a8d8f0,#c8b0f0,#e8b4f8);z-index:-1}
.cal__fab:active{transform:scale(.92)}
.cal__fab svg{position:relative;z-index:1}

/* ── Gallery ── */
.gal{padding-bottom:90px}
.gal__nav{display:flex;align-items:center;padding:8px 16px 12px;gap:12px}
.gal__close{width:36px;height:36px;border:none;background:none;font-size:22px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.gal__title{flex:1;text-align:center;font-size:16px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:4px}
.gal__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 2px}
.gal__thumb{aspect-ratio:1;position:relative;cursor:pointer;overflow:hidden;border:none;padding:0;background:none}
.gal__thumb img{width:100%;height:100%;object-fit:cover;display:block}
.gal__check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);background:rgba(0,0,0,.15)}
.gal__thumb.selected .gal__check{background:rgba(80,80,80,.75);border-color:transparent}
.gal__thumb.selected .gal__check::after{content:'';position:absolute;inset:5px;background:#fff;border-radius:50%}
.gal__bar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 20px calc(12px + env(safe-area-inset-bottom,20px));background:var(--white);border-top:1px solid var(--line)}
.gal__preview{border:none;background:none;font-size:15px;color:#ccc;font-family:inherit;cursor:pointer;padding:10px}
.gal__preview.on{color:var(--text)}
.gal__confirm{min-width:120px;padding:12px 28px;border:none;border-radius:12px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;background:#e8e8e8;color:#aaa;transition:all .2s}
.gal__confirm.on{background:#1a1a1a;color:#fff}

/* ── Profile ── */
.prof{padding:40px 32px 48px;display:flex;flex-direction:column;align-items:center;min-height:100%}
.prof__card{width:220px;height:220px;background:#f0f0f0;border-radius:28px;display:flex;align-items:center;justify-content:center;margin:48px 0 56px;transform:rotate(-6deg);box-shadow:0 8px 32px rgba(0,0,0,.06)}
.prof__card img{width:75%;height:75%;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.08))}
.prof__field{width:100%;max-width:300px;padding:16px 24px;border:1px solid #e0e0e0;border-radius:100px;font-size:15px;font-family:inherit;color:var(--text);background:transparent;margin-bottom:14px;outline:none;text-align:center}
.prof__field::placeholder{color:#ccc}
.prof__skip{margin-top:auto;padding:20px;border:none;background:none;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit}

/* ── Plant Detail ── */
.plant{padding:0 20px 48px}
.plant__nav{text-align:center;padding:4px 0 20px;font-family:var(--serif);font-size:20px;font-weight:500;color:var(--text)}
.plant__back{position:absolute;left:16px;top:52px;width:36px;height:36px;border:none;background:none;cursor:pointer;font-size:20px;color:var(--text);display:none}
.plant.has-back .plant__back{display:flex;align-items:center;justify-content:center}
.plant__hero{background:var(--card);border-radius:28px;aspect-ratio:1;max-width:340px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.plant__hero img{width:72%;height:72%;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.08))}
.plant__name{font-family:var(--serif);font-size:32px;text-align:center;margin-bottom:20px;color:var(--text)}
.plant__row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.plant__mini{background:var(--card);border-radius:var(--r-sm);padding:14px 14px 16px;cursor:pointer;transition:opacity .2s}
.plant__mini:active{opacity:.7}
.plant__mini h4{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.plant__mini h4 svg{width:12px;height:12px;opacity:.4}
.plant__mini p{font-size:11px;line-height:1.5;color:var(--muted)}
.plant__ask{display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px}
.plant__ask span{font-size:13px;color:var(--text);display:flex;align-items:center;gap:4px}
.plant__refresh{border:none;background:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit}
.plant__chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.plant__chip{padding:10px 16px;border:1px solid #e0e0e0;border-radius:100px;font-size:13px;color:var(--text);background:var(--white);cursor:pointer;font-family:inherit;transition:background .2s}
.plant__chip:active{background:var(--card)}
.plant__card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px 18px;margin-bottom:10px}
.plant__card label{font-size:11px;color:#b8a080;display:block;margin-bottom:10px;letter-spacing:.02em}
.plant__card p{font-size:13px;line-height:1.75;color:var(--text)}
.plant__metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.plant__metric{background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px}
.plant__metric-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.plant__metric-top svg{width:16px;height:16px;flex-shrink:0;margin-top:2px}
.plant__metric strong{font-family:var(--serif);font-size:22px;font-weight:500;display:block;line-height:1}
.plant__metric span{font-size:10px;color:var(--muted);line-height:1.4;display:block;margin-top:4px}
.plant__bar{height:3px;border-radius:2px;background:#f0f0f0;margin-top:12px;overflow:hidden}
.plant__bar i{display:block;height:100%;border-radius:2px}

/* ── Chat overlay ── */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);z-index:50;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;display:flex;align-items:flex-end}
.overlay.open{opacity:1;visibility:visible}
.sheet{width:100%;background:var(--white);border-radius:24px 24px 0 0;padding:20px 20px 36px;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70%;overflow-y:auto}
.overlay.open .sheet{transform:none}
.sheet__handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.sheet h3{font-size:17px;font-weight:600;margin-bottom:12px}
.sheet p{font-size:14px;line-height:1.7;color:#555}

.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);background:rgba(26,26,26,.92);color:#fff;padding:14px 22px;border-radius:16px;font-size:14px;line-height:1.5;text-align:center;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:60;max-width:280px;white-space:normal}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

.proc{position:absolute;inset:0;background:rgba(250,250,250,.95);z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.proc.on{display:flex}
.proc__ring{width:40px;height:40px;border:2px solid var(--line);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="status">
    <span id="clock">9:41</span>
    <span class="status__r">●●●● ▮</span>
  </div>

  <div class="view">
    <!-- Calendar -->
    <section class="page active" id="page-calendar">
      <div class="cal">
        <h1 class="cal__today">Today</h1>
        <p class="cal__date" id="cal-date">June.23</p>
        <div class="cal__card">
          <div class="cal__grid" id="cal-grid"></div>
        </div>
        <p class="cal__hint" id="cal-hint">点击下方相机开始记录</p>
      </div>
      <div class="cal__fab-wrap">
        <button class="cal__fab" id="btn-camera" aria-label="拍照">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>
    </section>

    <!-- Gallery -->
    <section class="page" id="page-gallery">
      <div class="gal">
        <div class="gal__nav">
          <button class="gal__close" id="gal-close">×</button>
          <div class="gal__title">最近项目 <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="#333" stroke-width="1.2" fill="none"/></svg></div>
          <span style="width:36px"></span>
        </div>
        <div class="gal__grid" id="gal-grid"></div>
      </div>
      <div class="gal__bar">
        <button class="gal__preview" id="gal-preview">预览</button>
        <button class="gal__confirm" id="gal-confirm">确认</button>
      </div>
    </section>

    <!-- Profile -->
    <section class="page" id="page-profile">
      <div class="prof">
        <div class="prof__card" id="prof-sticker"></div>
        <input class="prof__field" id="inp-nick" placeholder="昵称" maxlength="20">
        <input class="prof__field" id="inp-loc" placeholder="记录地点" maxlength="30">
        <button class="prof__skip" id="prof-skip">仅记录，不填写</button>
      </div>
    </section>

    <!-- Plant Detail -->
    <section class="page" id="page-plant">
      <div class="plant" id="plant-wrap">
        <button class="plant__back" id="plant-back">‹</button>
        <div class="plant__nav">Plant Moment</div>
        <div class="plant__hero" id="plant-hero"></div>
        <h2 class="plant__name" id="plant-name">大龟背竹</h2>
        <div class="plant__row">
          <div class="plant__mini" data-toast="今日诊断详情">
            <h4>今日诊断 <svg viewBox="0 0 8 12"><path d="M2 2l4 4-4 4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg></h4>
            <p id="txt-diag">急需补水，保持土壤湿润</p>
          </div>
          <div class="plant__mini" data-toast="今日心情记录">
            <h4>今日心情 <svg viewBox="0 0 8 12"><path d="M2 2l4 4-4 4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg></h4>
            <p id="txt-mood">叶片舒展，状态平稳</p>
          </div>
        </div>
        <div class="plant__ask">
          <span>✦ 向植物医生提问</span>
          <button class="plant__refresh" id="btn-refresh">换一换</button>
        </div>
        <div class="plant__chips" id="chip-box"></div>
        <div class="plant__card">
          <label>深度诊断报告</label>
          <p id="txt-report">叶片发黄主要是光照偏弱导致的光合作用下降，目前属于轻度应激状态。</p>
        </div>
        <div class="plant__card">
          <label>建议行动方案</label>
          <p id="txt-action">建议在 2–3 天内增加散射光照，否则会进一步影响新叶生长。</p>
        </div>
        <div class="plant__metrics">
          <div class="plant__metric">
            <div class="plant__metric-top">
              <svg viewBox="0 0 16 16" fill="none"><path d="M9 2L4 9h4l-1 5 6-8H9L9 2z" fill="#e57373"/></svg>
              <div><strong id="val-risk">45%</strong><span>未来3天局部枯萎风险</span></div>
            </div>
            <div class="plant__bar"><i style="width:45%;background:#e57373"></i></div>
          </div>
          <div class="plant__metric">
            <div class="plant__metric-top">
              <svg viewBox="0 0 16 16" fill="none"><path d="M2 12l4-6 3 3 5-8" stroke="#81c784" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              <div><strong id="val-recover">15%</strong><span>预计5天后好转</span></div>
            </div>
            <div class="plant__bar"><i style="width:15%;background:#81c784"></i></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="proc" id="proc"><div class="proc__ring"></div><span style="font-size:13px;color:#999">正在识别植物轮廓…</span></div>
  <div class="overlay" id="overlay"><div class="sheet"><div class="sheet__handle"></div><h3 id="sheet-title"></h3><p id="sheet-body"></p></div></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="file-input" accept="image/*" capture="environment" hidden>
</div>

<script>
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QUESTIONS=[
  ['它为什么黄叶？','黄叶通常由浇水过多或光照不足引起。先检查土壤，移至明亮散射光处观察。'],
  ['要不要换盆？','根系冒出排水孔或生长停滞时该换盆了，春季是最佳时机。'],
  ['叶子卷边怎么办？','卷边多与干燥或强光有关，增加湿度并避开直射阳光。'],
  ['多久浇一次水？','龟背竹喜湿润但不耐涝，土表干燥 2cm 再浇透即可。']
];
const GAL_COLORS=[
  ['#8fbc8f','#6b9e78'],['#87ceeb','#5b8fb9'],['#deb887','#c49a6c'],
  ['#98d8c8','#6bb89a'],['#f0c987','#d4a96a'],['#a8c8e8','#7aa8cc'],
  ['#c5e1a5','#8bc34a'],['#90caf9','#42a5f5'],['#ffcc80','#ffa726'],
  ['#b0bec5','#78909c'],['#ce93d8','#ab47bc'],['#80cbc4','#26a69a'],
  ['#ffab91','#ff7043'],['#fff59d','#fdd835'],['#bcaaa4','#8d6e63'],
  ['#a5d6a7','#66bb6a'],['#81d4fa','#29b6f6'],['#ffe082','#ffca28']
];

const Cutout={
  MAX:800,STROKE:2,PLANT:[61,107,82],

  load(src){return new Promise((ok,no)=>{const i=new Image();i.onload=()=>ok(i);i.onerror=no;i.src=src})},

  sampleBg(d,w,h){
    const pts=[];
    for(let x=0;x<w;x++){pts.push([x,0],[x,h-1])}
    for(let y=1;y<h-1;y++){pts.push([0,y],[w-1,y])}
    let r=0,g=0,b=0,n=0;
    pts.forEach(([x,y])=>{const k=(y*w+x)*4;if(d[k+3]<30)return;r+=d[k];g+=d[k+1];b+=d[k+2];n++});
    if(!n)return{r:255,g:255,b:255};
    return{r:r/n,g:g/n,b:b/n};
  },

  isBg(r,g,b,a,bg){
    if(a<18)return true;
    const lum=.299*r+.587*g+.114*b;
    const dist=Math.hypot(r-bg.r,g-bg.g,b-bg.b);
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
    const sat=mx?(mx-mn)/mx:0;
    return dist<52||lum>246||(lum>212&&sat<.14);
  },

  buildMask(d,w,h){
    const mask=new Uint8Array(w*h);
    let tr=0;
    for(let i=0;i<w*h;i++)if(d[i*4+3]<20)tr++;
    const useAlpha=tr/(w*h)>.04;

    if(useAlpha){
      for(let i=0;i<w*h;i++)mask[i]=d[i*4+3]>18?1:0;
    }else{
      const bg=this.sampleBg(d,w,h);
      for(let i=0;i<w*h;i++){
        const k=i*4;
        mask[i]=this.isBg(d[k],d[k+1],d[k+2],d[k+3],bg)?0:1;
      }
    }
    return mask;
  },

  keepLargest(mask,w,h){
    const vis=new Uint8Array(w*h),lbl=new Int32Array(w*h).fill(-1);
    let best=0,bestId=-1,id=0;
    const flood=(sx,sy,tag)=>{
      const st=[[sx,sy]];let n=0;
      while(st.length){
        const[x,y]=st.pop(),i=y*w+x;
        if(x<0||y<0||x>=w||y>=h||vis[i]||!mask[i])continue;
        vis[i]=1;lbl[i]=tag;n++;
        st.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
      }
      return n;
    };
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=y*w+x;
      if(!vis[i]&&mask[i]){const n=flood(x,y,id);if(n>best){best=n;bestId=id}id++}
    }
    if(best<16){
      let sum=0;for(let i=0;i<mask.length;i++)sum+=mask[i];
      if(sum<16)throw new Error('no subject');
      return mask;
    }
    const out=new Uint8Array(w*h);
    for(let i=0;i<w*h;i++)out[i]=lbl[i]===bestId?1:0;
    return out;
  },

  maskToSilhouette(mask,w,h){
    const id=new ImageData(w,h),[pr,pg,pb]=this.PLANT;
    for(let i=0;i<w*h;i++){
      const o=i*4;
      if(mask[i]){id.data[o]=pr;id.data[o+1]=pg;id.data[o+2]=pb;id.data[o+3]=255}
    }
    return id;
  },

  dilate(mask,w,h,r){
    const out=new Uint8Array(w*h),r2=r*r;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=y*w+x;
      if(mask[i]){out[i]=1;continue}
      let hit=false;
      for(let dy=-r;dy<=r&&!hit;dy++)for(let dx=-r;dx<=r&&!hit;dx++){
        if(dx*dx+dy*dy>r2)continue;
        const nx=x+dx,ny=y+dy;
        if(nx>=0&&ny>=0&&nx<w&&ny<h&&mask[ny*w+nx])hit=true;
      }
      out[i]=hit?1:0;
    }
    return out;
  },

  boundsFromMask(mask,w,h){
    let mx=w,my=h,Mx=0,My=0;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(mask[y*w+x]){
      mx=Math.min(mx,x);my=Math.min(my,y);Mx=Math.max(Mx,x);My=Math.max(My,y);
    }
    if(Mx<mx)return null;
    return{mx,my,w:Mx-mx+1,h:My-my+1};
  },

  addStroke(sil,w,h){
    const S=this.STROKE,pad=S+2,ow=w+pad*2,oh=h+pad*2;
    const alpha=new Uint8Array(w*h);
    for(let i=0;i<w*h;i++)alpha[i]=sil.data[i*4+3]>127?1:0;
    const ring=this.dilate(alpha,w,h,S);
    const img=new ImageData(ow,oh);
    const[pr,pg,pb]=this.PLANT;
    for(let y=0;y<oh;y++)for(let x=0;x<ow;x++){
      const cx=x-pad,cy=y-pad,di=(y*ow+x)*4;
      if(cx<0||cy<0||cx>=w||cy>=h){img.data[di+3]=0;continue}
      const ai=cy*w+cx;
      if(alpha[ai]){
        img.data[di]=pr;img.data[di+1]=pg;img.data[di+2]=pb;img.data[di+3]=255;
      }else if(ring[ai]){
        img.data[di]=255;img.data[di+1]=255;img.data[di+2]=255;img.data[di+3]=255;
      }else img.data[di+3]=0;
    }
    const c=document.createElement('canvas');c.width=ow;c.height=oh;
    c.getContext('2d').putImageData(img,0,0);
    return c.toDataURL('image/png');
  },

  process(id,w,h){
    let mask=this.buildMask(id.data,w,h);
    mask=this.keepLargest(mask,w,h);
    const b=this.boundsFromMask(mask,w,h);
    if(!b||b.w<3)throw new Error('no subject');
    const cropped=new Uint8Array(b.w*b.h);
    for(let y=0;y<b.h;y++)for(let x=0;x<b.w;x++)cropped[y*b.w+x]=mask[(b.my+y)*w+b.mx+x];
    const sil=this.maskToSilhouette(cropped,b.w,b.h);
    return this.addStroke(sil,b.w,b.h);
  },

  async fromFile(file){
    const url=URL.createObjectURL(file);
    try{
      const img=await this.load(url);
      const sc=Math.min(1,this.MAX/Math.max(img.naturalWidth,img.naturalHeight));
      const w=Math.max(1,Math.round(img.naturalWidth*sc));
      const h=Math.max(1,Math.round(img.naturalHeight*sc));
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d',{willReadFrequently:true});
      ctx.clearRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      return this.process(ctx.getImageData(0,0,w,h),w,h);
    }finally{URL.revokeObjectURL(url)}
  },

  async fromCanvas(c){
    return this.process(c.getContext('2d').getImageData(0,0,c.width,c.height),c.width,c.height);
  },

  drawLeaf(ctx,w,h,type){
    ctx.fillStyle='#3d6b52';
    if(type==='pot'){ctx.fillStyle='#c67b4e';ctx.beginPath();ctx.moveTo(w*.28,h*.72);ctx.lineTo(w*.72,h*.72);ctx.lineTo(w*.68,h*.88);ctx.lineTo(w*.32,h*.88);ctx.fill();ctx.fillStyle='#3d6b52'}
    if(type==='monstera'||type==='pot'){
      const cx=w/2,cy=h*(type==='pot'?.42:.5);
      ctx.beginPath();ctx.moveTo(cx,cy-h*.28);ctx.bezierCurveTo(cx-w*.3,cy-h*.1,cx-w*.28,cy+h*.2,cx,cy+h*.28);ctx.bezierCurveTo(cx+w*.28,cy+h*.2,cx+w*.3,cy-h*.1,cx,cy-h*.28);ctx.fill();
      ctx.fillStyle='rgba(30,50,38,.3)';[[-.1,-.05],[.08,.02],[-.02,.12]].forEach(([fx,fy])=>{ctx.beginPath();ctx.ellipse(cx+fx*w,cy+fy*h,8,14,0,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#3d6b52';
      if(type==='pot'){ctx.beginPath();ctx.ellipse(cx-w*.15,cy+h*.05,14,22,-.4,0,Math.PI*2);ctx.ellipse(cx+w*.12,cy+h*.02,12,20,.35,0,Math.PI*2);ctx.fill()}
    }else if(type==='succulent'){for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(w/2,w*.35+i*16,14-i*2,28,0,0,Math.PI*2);ctx.fill()}}
    else if(type==='leaf'){ctx.beginPath();ctx.moveTo(w/2,h*.15);ctx.bezierCurveTo(w*.2,h*.4,w*.25,h*.75,w/2,h*.85);ctx.bezierCurveTo(w*.75,h*.75,w*.8,h*.4,w/2,h*.15);ctx.fill()}
    else{ctx.beginPath();ctx.arc(w/2,h*.5,40,0,Math.PI*2);ctx.fill()}
  },

  async preset(type){
    const c=document.createElement('canvas');c.width=240;c.height=280;
    const ctx=c.getContext('2d');ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,240,280);
    this.drawLeaf(ctx,240,280,type);
    return this.fromCanvas(c);
  }
};

const S={
  page:'calendar',galSel:null,qIdx:0,
  plant:{name:'大龟背竹',nick:'',loc:'',sticker:null},
  stickers:{},
  demo:[{day:7,type:'pot',rot:-8},{day:15,type:'succulent',rot:12},{day:18,type:'pot',rot:-4},{day:26,type:'leaf',rot:6}]
};

function $(id){return document.getElementById(id)}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function showPage(name){document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+name));S.page=name}
function openSheet(title,body){$('sheet-title').textContent=title;$('sheet-body').textContent=body;$('overlay').classList.add('open')}
function setImg(el,url){el.innerHTML=`<img src="${url}" alt="" draggable="false">`}

function buildCal(){
  const now=new Date(),mo=now.getMonth(),yr=now.getFullYear(),today=now.getDate(),dim=new Date(yr,mo+1,0).getDate();
  $('cal-date').textContent=`${MONTHS[mo]}.${today}`;
  const g=$('cal-grid');g.innerHTML='';
  for(let d=1;d<=dim;d++){
    const c=document.createElement('div');c.className='cal__day'+(d===today?' is-today':'');
    c.dataset.day=d;c.innerHTML=`<span class="cal__num">${d}</span>`;
    if(S.stickers[d])attachSticker(c,S.stickers[d]);g.appendChild(c);
  }
  $('cal-hint').textContent=Object.keys(S.stickers).length?'点击贴纸查看植物状态':'点击下方相机开始记录';
}

function attachSticker(cell,data){
  cell.classList.add('has-sticker');
  const s=document.createElement('div');s.className='cal__sticker';s.style.setProperty('--rot',data.rot+'deg');
  s.innerHTML=`<img src="${data.url}" alt="">`;
  s.onclick=e=>{e.stopPropagation();goPlant(true)};
  cell.appendChild(s);
  cell.onclick=()=>goPlant(true);
}

function buildGal(){
  const g=$('gal-grid');g.innerHTML='';
  GAL_COLORS.forEach((cols,i)=>{
    const b=document.createElement('button');b.className='gal__thumb';b.dataset.i=i;
    const cv=document.createElement('canvas');cv.width=120;cv.height=120;const cx=cv.getContext('2d');
    const gr=cx.createLinearGradient(0,0,120,120);gr.addColorStop(0,cols[0]);gr.addColorStop(1,cols[1]);cx.fillStyle=gr;cx.fillRect(0,0,120,120);
    if(i===3){cx.fillStyle='rgba(61,107,82,.5)';cx.beginPath();cx.ellipse(60,70,30,45,0,0,Math.PI*2);cx.fill()}
    const img=document.createElement('img');img.src=cv.toDataURL();b.appendChild(img);
    b.innerHTML+=`<span class="gal__check"></span>`;b.onclick=()=>selectGal(i,b);g.appendChild(b);
  });
}

function selectGal(i,el){
  S.galSel=i;document.querySelectorAll('.gal__thumb').forEach(t=>t.classList.remove('selected'));
  el.classList.add('selected');$('gal-preview').classList.add('on');$('gal-confirm').classList.add('on');
}

async function processUpload(file){
  if(!file||!file.type.startsWith('image/')){toast('请选择图片文件');return}
  $('proc').classList.add('on');
  try{
    S.plant.sticker=await Cutout.fromFile(file);
    $('inp-nick').value='';$('inp-loc').value='';
    setImg($('prof-sticker'),S.plant.sticker);
    showPage('profile');
  }catch(e){
    console.warn('cutout failed',e);
    toast('未能识别植物，请换一张背景简洁的照片');
  }finally{
    $('proc').classList.remove('on');
  }
}

async function confirmGal(){
  if(S.galSel===null)return;
  $('proc').classList.add('on');
  await new Promise(r=>setTimeout(r,900));
  try{
    const types=['monstera','pot','succulent','leaf','monstera'];
    S.plant.sticker=await Cutout.preset(types[S.galSel%types.length]);
  }catch{S.plant.sticker=await Cutout.preset('monstera')}
  $('proc').classList.remove('on');
  setImg($('prof-sticker'),S.plant.sticker);
  showPage('profile');
}

function finishProfile(){
  const nick=$('inp-nick').value.trim(),loc=$('inp-loc').value.trim();
  if(nick)S.plant.nick=nick;
  if(loc)S.plant.loc=loc;
  S.plant.name=nick||'大龟背竹';
  const today=new Date().getDate();
  S.stickers[today]={url:S.plant.sticker,rot:Math.random()*14-7};
  if(!S._seeded){S._seeded=1;(async()=>{for(const d of S.demo){if(!S.stickers[d.day])S.stickers[d.day]={url:await Cutout.preset(d.type),rot:d.rot}}buildCal()})()}
  buildCal();updatePlant();showPage('plant');$('plant-wrap').classList.add('has-back');
}

function updatePlant(){
  $('plant-name').textContent=S.plant.name;
  setImg($('plant-hero'),S.plant.sticker||'');
  if(S.plant.loc)$('txt-mood').textContent=`在${S.plant.loc}，叶片舒展`;
}

function goPlant(fromCal){
  if(!S.plant.sticker&&Object.keys(S.stickers).length){const d=Math.max(...Object.keys(S.stickers).map(Number));S.plant.sticker=S.stickers[d].url}
  if(!S.plant.sticker){toast('请先拍摄植物');showPage('calendar');return}
  updatePlant();
  $('plant-wrap').classList.toggle('has-back',!!fromCal);
  showPage('plant');
}

function renderChips(){
  const box=$('chip-box');box.innerHTML='';
  for(let i=0;i<2;i++){const q=QUESTIONS[(S.qIdx+i)%QUESTIONS.length];
    const b=document.createElement('button');b.className='plant__chip';b.textContent=q[0];
    b.onclick=()=>openSheet('植物医生',q[1]);box.appendChild(b)}
}

$('btn-camera').onclick=()=>$('file-input').click();
$('file-input').addEventListener('change',e=>{
  const f=e.target.files?.[0];
  if(f)processUpload(f);
  e.target.value='';
});
$('gal-close').onclick=()=>showPage('calendar');
$('gal-confirm').onclick=()=>{if(S.galSel!==null)confirmGal()};
$('gal-preview').onclick=()=>{if(S.galSel!==null)openSheet('预览','已选择一张照片，确认后将自动抠图并生成植物贴纸。')};
$('prof-skip').onclick=finishProfile;
$('inp-nick').addEventListener('keydown',e=>{if(e.key==='Enter')finishProfile()});
$('inp-loc').addEventListener('keydown',e=>{if(e.key==='Enter')finishProfile()});
$('plant-back').onclick=()=>showPage('calendar');
$('btn-refresh').onclick=()=>{S.qIdx=(S.qIdx+1)%QUESTIONS.length;renderChips();toast('已换一批问题')};
$('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').classList.remove('open')};
document.querySelectorAll('[data-toast]').forEach(el=>el.onclick=()=>openSheet(el.dataset.toast,el.querySelector('p').textContent));

function tick(){$('clock').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'numeric',minute:'2-digit',hour12:false})}

(async function init(){
  buildCal();buildGal();renderChips();tick();setInterval(tick,3e4);
})();
</script>
</body>
</html>
